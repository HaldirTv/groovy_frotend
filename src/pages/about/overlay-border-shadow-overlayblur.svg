<svg width="600" height="450" viewBox="0 0 600 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="glow-purple" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#A98FDB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A98FDB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#72DEEF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#72DEEF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Neon Stroke Gradients -->
    <linearGradient id="neon-purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A98FDB"/>
      <stop offset="100%" stop-color="#E8D5FF"/>
    </linearGradient>
    <linearGradient id="neon-blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#72DEEF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    
    <!-- Blur Filter for Glow Effects -->
    <filter id="neon-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient background glow -->
  <rect width="600" height="450" rx="24" fill="#16161F"/>
  <circle cx="120" cy="130" r="180" fill="url(#glow-purple)"/>
  <circle cx="480" cy="320" r="200" fill="url(#glow-blue)"/>
  
  <!-- Subtle Grid Lines -->
  <path d="M 50,0 L 50,450 M 100,0 L 100,450 M 150,0 L 150,450 M 200,0 L 200,450 M 250,0 L 250,450 M 300,0 L 300,450 M 350,0 L 350,450 M 400,0 L 400,450 M 450,0 L 450,450 M 500,0 L 500,450 M 550,0 L 550,450" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
  <path d="M 0,50 L 600,50 M 0,100 L 600,100 M 0,150 L 600,150 M 0,200 L 600,200 M 0,250 L 600,250 M 0,300 L 600,300 M 0,350 L 600,350 M 0,400 L 600,400" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Waveform / Music Visualizer Graphics -->
  <g filter="url(#neon-blur)">
    <!-- Blue glowing sine wave -->
    <path d="M -50 250 C 100 150, 150 350, 300 250 C 450 150, 500 350, 650 250" fill="none" stroke="url(#neon-blue-grad)" stroke-width="4" opacity="0.85"/>
    <!-- Purple glowing offset wave -->
    <path d="M -50 220 C 80 320, 180 120, 300 220 C 420 320, 520 120, 650 220" fill="none" stroke="url(#neon-purple-grad)" stroke-width="3" opacity="0.75"/>
  </g>

  <!-- High-fidelity digital audio bars in the center -->
  <g transform="translate(150, 130)">
    <!-- Rounded EQ Bars -->
    <rect x="20" y="80" width="8" height="60" rx="4" fill="#72DEEF" opacity="0.6"/>
    <rect x="40" y="50" width="8" height="90" rx="4" fill="#72DEEF"/>
    <rect x="60" y="30" width="8" height="110" rx="4" fill="#72DEEF"/>
    <rect x="80" y="60" width="8" height="80" rx="4" fill="#A98FDB"/>
    <rect x="100" y="40" width="8" height="100" rx="4" fill="#A98FDB"/>
    <rect x="120" y="20" width="8" height="120" rx="4" fill="#72DEEF"/>
    <rect x="140" y="50" width="8" height="90" rx="4" fill="#A98FDB"/>
    <rect x="160" y="70" width="8" height="70" rx="4" fill="#A98FDB" opacity="0.6"/>
    <rect x="180" y="90" width="8" height="50" rx="4" fill="#72DEEF" opacity="0.5"/>
    <rect x="200" y="60" width="8" height="80" rx="4" fill="#72DEEF" opacity="0.8"/>
    <rect x="220" y="40" width="8" height="100" rx="4" fill="#A98FDB"/>
    <rect x="240" y="30" width="8" height="110" rx="4" fill="#72DEEF"/>
    <rect x="260" y="70" width="8" height="70" rx="4" fill="#A98FDB" opacity="0.7"/>
    <rect x="280" y="85" width="8" height="55" rx="4" fill="#A98FDB" opacity="0.4"/>
  </g>

  <!-- Glowing orb in center -->
  <circle cx="300" cy="220" r="12" fill="#FFFFFF" filter="url(#neon-blur)"/>
  <circle cx="300" cy="220" r="6" fill="#72DEEF"/>

  <!-- Decorative technical overlays (circles, crosshairs) -->
  <circle cx="300" cy="220" r="160" stroke="#72DEEF" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="5 5"/>
  <circle cx="300" cy="220" r="220" stroke="#A98FDB" stroke-opacity="0.15" stroke-width="1"/>
  
  <line x1="300" y1="20" x2="300" y2="40" stroke="#72DEEF" stroke-opacity="0.3" stroke-width="2"/>
  <line x1="300" y1="400" x2="300" y2="420" stroke="#72DEEF" stroke-opacity="0.3" stroke-width="2"/>
  <line x1="20" y1="220" x2="40" y2="220" stroke="#72DEEF" stroke-opacity="0.3" stroke-width="2"/>
  <line x1="560" y1="220" x2="580" y2="220" stroke="#72DEEF" stroke-opacity="0.3" stroke-width="2"/>
</svg>
